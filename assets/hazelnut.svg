  <path d="M75 78 Q68 95 66 118 Q66 142 72 160" stroke="#000" stroke-width="0.5" opacity="0.15"/>
  <path d="M85 72 Q78 92 77 118 Q77 145 82 166" stroke="#000" stroke-width="0.5" opacity="0.15"/>
  <path d="M100 68 Q98 90 98 118 Q98 148 100 170" stroke="#000" stroke-width="0.5" opacity="0.12"/>
  <path d="M115 72 Q120 92 121 118 Q121 145 118 166" stroke="#000" stroke-width="0.5" opacity="0.15"/>
  <path d="M128 78 Q134 95 136 118 Q136 142 130 160" stroke="#000" stroke-width="0.5" opacity="0.15"/>

  <!-- Nut tip (pointed bottom) -->
