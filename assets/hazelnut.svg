  <path d="M65 82 Q58 58 62 30 Q64 22 68 18 Q70 32 70 50 Q70 66 66 78 Q65 80 65 82Z" stroke="#000" stroke-width="1.5" fill="#000" opacity="0.08"/>
  <path d="M66 24 Q68 45 68 65 Q67 76 65 82" stroke="#000" stroke-width="0.5" opacity="0.2"/>

  <!-- Center-left husk leaf -->
  <path d="M82 74 Q80 48 85 22 Q87 14 92 10 Q92 26 90 44 Q88 60 84 72 Q83 73 82 74Z" stroke="#000" stroke-width="1.5" fill="#000" opacity="0.08"/>
  <path d="M88 15 Q89 38 87 58 Q85 68 82 74" stroke="#000" stroke-width="0.5" opacity="0.2"/>

  <!-- Center husk leaf -->
  <path d="M100 68 Q100 40 105 16 Q107 8 110 5 Q110 18 108 36 Q106 52 102 66 Q101 67 100 68Z" stroke="#000" stroke-width="1.5" fill="#000" opacity="0.08"/>
  <path d="M108 10 Q108 32 106 52 Q104 62 100 68" stroke="#000" stroke-width="0.5" opacity="0.2"/>

  <!-- Center-right husk leaf -->
  <path d="M118 74 Q122 48 128 24 Q130 16 134 14 Q132 28 128 46 Q124 62 120 72 Q119 73 118 74Z" stroke="#000" stroke-width="1.5" fill="#000" opacity="0.08"/>
  <path d="M132 18 Q130 38 126 56 Q122 68 118 74" stroke="#000" stroke-width="0.5" opacity="0.2"/>

  <!-- Right inner husk leaf -->
  <path d="M135 82 Q140 58 138 32 Q137 24 134 20 Q132 34 132 52 Q132 68 134 78 Q135 80 135 82Z" stroke="#000" stroke-width="1.5" fill="#000" opacity="0.08"/>
  <path d="M136 26 Q134 46 134 66 Q135 76 135 82" stroke="#000" stroke-width="0.5" opacity="0.2"/>

  <!-- Right outer husk leaf -->
  <path d="M152 98 Q160 74 158 46 Q157 36 154 30 Q150 44 148 62 Q147 78 150 92 Q151 95 152 98Z" stroke="#000" stroke-width="1.5" fill="#000" opacity="0.08"/>
  <path d="M156 36 Q152 56 150 76 Q150 90 152 98" stroke="#000" stroke-width="0.5" opacity="0.2"/>

  <!-- Husk edge connecting at nut top -->
  <path d="M48 98 Q55 88 65 82 Q72 76 82 74 Q90 70 100 68 Q110 70 118 74 Q128 78 135 82 Q145 88 152 98" stroke="#000" stroke-width="1" opacity="0.3" stroke-dasharray="2 3"/>

  <!-- Subtle highlight on nut -->
  <path d="M72 95 Q68 108 68 125 Q68 140 72 150" stroke="#000" stroke-width="0.8" opacity="0.08"/>
</svg>
