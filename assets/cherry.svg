<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Cherry branch with two cherries -->
  <!-- Stems -->
  <path d="M100 30 Q95 50 80 75 Q70 90 65 105" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M100 30 Q110 55 125 75 Q135 88 140 100" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left cherry -->
  <circle cx="60" cy="120" r="28" fill="#000" opacity="0.25" stroke="#000" stroke-width="1.5"/>
  <path d="M48 108 Q55 105 65 108" stroke="#000" stroke-width="0.8" opacity="0.4"/>
  <!-- Right cherry -->
  <circle cx="145" cy="115" r="25" fill="#000" opacity="0.25" stroke="#000" stroke-width="1.5"/>
  <path d="M135 104 Q142 101 150 104" stroke="#000" stroke-width="0.8" opacity="0.4"/>
  <!-- Leaf -->
  <path d="M100 30 Q115 20 130 15 Q125 30 110 38 Q102 42 100 30Z" fill="#000" opacity="0.2" stroke="#000" stroke-width="1"/>
  <line x1="100" y1="30" x2="125" y2="18" stroke="#000" stroke-width="0.6" opacity="0.4"/>
  <!-- Small leaf -->
  <path d="M100 30 Q85 22 78 12 Q90 18 98 28Z" fill="#000" opacity="0.15" stroke="#000" stroke-width="0.8"/>
</svg>
