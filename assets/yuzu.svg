<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Citrus/Yuzu cross-section slice -->
  <!-- Outer rind -->
  <circle cx="100" cy="100" r="88" stroke="#000" stroke-width="2.5"/>
  <!-- Rind inner edge -->
  <circle cx="100" cy="100" r="78" stroke="#000" stroke-width="1.5"/>
  <!-- Albedo (white pith) subtle ring -->
  <circle cx="100" cy="100" r="74" stroke="#000" stroke-width="0.4" opacity="0.3"/>
  <!-- Central pith -->
  <circle cx="100" cy="100" r="12" stroke="#000" stroke-width="1.5" fill="#000" opacity="0.08"/>

  <!-- 10 segment dividers -->
  <line x1="100" y1="22" x2="100" y2="88" stroke="#000" stroke-width="1"/>
  <line x1="100" y1="112" x2="100" y2="178" stroke="#000" stroke-width="1"/>
  <line x1="22" y1="100" x2="88" y2="100" stroke="#000" stroke-width="1"/>
  <line x1="112" y1="100" x2="178" y2="100" stroke="#000" stroke-width="1"/>
  <line x1="52.3" y1="37.8" x2="91.5" y2="91.5" stroke="#000" stroke-width="1"/>
  <line x1="108.5" y1="108.5" x2="147.7" y2="162.2" stroke="#000" stroke-width="1"/>
  <line x1="147.7" y1="37.8" x2="108.5" y2="91.5" stroke="#000" stroke-width="1"/>
  <line x1="91.5" y1="108.5" x2="52.3" y2="162.2" stroke="#000" stroke-width="1"/>
  <line x1="27.6" y1="63.5" x2="89.2" y2="95.4" stroke="#000" stroke-width="1"/>
  <line x1="110.8" y1="104.6" x2="172.4" y2="136.5" stroke="#000" stroke-width="1"/>
  <line x1="172.4" y1="63.5" x2="110.8" y2="95.4" stroke="#000" stroke-width="1"/>
  <line x1="89.2" y1="104.6" x2="27.6" y2="136.5" stroke="#000" stroke-width="1"/>

  <!-- Juice vesicle curves in segments (teardrop shapes) -->
  <!-- Top segment -->
  <path d="M97 30 Q92 50 94 72 Q96 78 100 80" stroke="#000" stroke-width="0.6" opacity="0.35"/>
  <path d="M103 30 Q108 50 106 72 Q104 78 100 80" stroke="#000" stroke-width="0.6" opacity="0.35"/>
  <!-- Bottom segment -->
  <path d="M97 170 Q92 150 94 128 Q96 122 100 120" stroke="#000" stroke-width="0.6" opacity="0.35"/>
  <path d="M103 170 Q108 150 106 128 Q104 122 100 120" stroke="#000" stroke-width="0.6" opacity="0.35"/>
  <!-- Right segment -->
  <path d="M170 97 Q150 92 128 94 Q122 96 120 100" stroke="#000" stroke-width="0.6" opacity="0.35"/>
  <path d="M170 103 Q150 108 128 106 Q122 104 120 100" stroke="#000" stroke-width="0.6" opacity="0.35"/>
  <!-- Left segment -->
  <path d="M30 97 Q50 92 72 94 Q78 96 80 100" stroke="#000" stroke-width="0.6" opacity="0.35"/>
  <path d="M30 103 Q50 108 72 106 Q78 104 80 100" stroke="#000" stroke-width="0.6" opacity="0.35"/>

  <!-- Upper-right diagonal vesicles -->
  <path d="M140 42 Q128 52 116 72 Q112 80 110 86" stroke="#000" stroke-width="0.6" opacity="0.3"/>
  <path d="M145 48 Q132 58 118 76 Q114 82 112 88" stroke="#000" stroke-width="0.6" opacity="0.3"/>
  <!-- Upper-left diagonal vesicles -->
  <path d="M60 42 Q72 52 84 72 Q88 80 90 86" stroke="#000" stroke-width="0.6" opacity="0.3"/>
  <path d="M55 48 Q68 58 82 76 Q86 82 88 88" stroke="#000" stroke-width="0.6" opacity="0.3"/>
  <!-- Lower-right diagonal vesicles -->
  <path d="M140 158 Q128 148 116 128 Q112 120 110 114" stroke="#000" stroke-width="0.6" opacity="0.3"/>
  <path d="M145 152 Q132 142 118 124 Q114 118 112 112" stroke="#000" stroke-width="0.6" opacity="0.3"/>
  <!-- Lower-left diagonal vesicles -->
  <path d="M60 158 Q72 148 84 128 Q88 120 90 114" stroke="#000" stroke-width="0.6" opacity="0.3"/>
  <path d="M55 152 Q68 142 82 124 Q86 118 88 112" stroke="#000" stroke-width="0.6" opacity="0.3"/>

  <!-- Seeds near center -->
  <ellipse cx="106" cy="88" rx="2.5" ry="5" fill="#000" opacity="0.2" transform="rotate(-20 106 88)"/>
  <ellipse cx="88" cy="106" rx="2.5" ry="5" fill="#000" opacity="0.2" transform="rotate(70 88 106)"/>
  <ellipse cx="112" cy="106" rx="2.5" ry="5" fill="#000" opacity="0.2" transform="rotate(-70 112 106)"/>
  <ellipse cx="94" cy="88" rx="2" ry="4.5" fill="#000" opacity="0.15" transform="rotate(20 94 88)"/>
  <ellipse cx="106" cy="114" rx="2" ry="4.5" fill="#000" opacity="0.15" transform="rotate(160 106 114)"/>

  <!-- Rind texture dots -->
  <circle cx="100" cy="9" r="1.2" fill="#000" opacity="0.15"/>
  <circle cx="115" cy="10" r="0.8" fill="#000" opacity="0.12"/>
  <circle cx="85" cy="11" r="1" fill="#000" opacity="0.12"/>
  <circle cx="130" cy="14" r="1" fill="#000" opacity="0.12"/>
  <circle cx="70" cy="14" r="0.8" fill="#000" opacity="0.12"/>
  <circle cx="155" cy="30" r="1" fill="#000" opacity="0.12"/>
  <circle cx="45" cy="30" r="1.2" fill="#000" opacity="0.12"/>
  <circle cx="170" cy="50" r="0.8" fill="#000" opacity="0.12"/>
  <circle cx="30" cy="50" r="1" fill="#000" opacity="0.12"/>
  <circle cx="180" cy="75" r="1" fill="#000" opacity="0.12"/>
  <circle cx="20" cy="75" r="0.8" fill="#000" opacity="0.12"/>
  <circle cx="9" cy="100" r="1" fill="#000" opacity="0.12"/>
  <circle cx="191" cy="100" r="0.8" fill="#000" opacity="0.12"/>
  <circle cx="20" cy="125" r="1" fill="#000" opacity="0.12"/>
  <circle cx="180" cy="125" r="0.8" fill="#000" opacity="0.12"/>
  <circle cx="30" cy="150" r="1.2" fill="#000" opacity="0.12"/>
  <circle cx="170" cy="150" r="1" fill="#000" opacity="0.12"/>
  <circle cx="45" cy="170" r="0.8" fill="#000" opacity="0.12"/>
  <circle cx="155" cy="170" r="1" fill="#000" opacity="0.12"/>
  <circle cx="100" cy="191" r="1" fill="#000" opacity="0.12"/>
  <circle cx="130" cy="186" r="0.8" fill="#000" opacity="0.12"/>
  <circle cx="70" cy="186" r="1" fill="#000" opacity="0.12"/>
</svg>
