<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Hazelnut with involucre (husk) - botanical illustration style -->

  <!-- Nut body -->
  <path d="M62 82 Q52 95 50 118 Q50 145 62 158 Q75 172 100 172 Q125 172 138 158 Q150 145 150 118 Q150 95 138 82 Q125 70 100 68 Q75 70 62 82Z" stroke="#000" stroke-width="2" fill="#000" opacity="0.12"/>

