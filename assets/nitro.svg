  <circle cx="95" cy="108" r="2.5" fill="#000" opacity="0.1"/>
  <circle cx="110" cy="95" r="3.5" fill="#000" opacity="0.12"/>
  <circle cx="85" cy="120" r="2" fill="#000" opacity="0.08"/>
  <circle cx="105" cy="118" r="4" fill="#000" opacity="0.12"/>
  <circle cx="120" cy="110" r="2.5" fill="#000" opacity="0.1"/>
  <circle cx="90" cy="135" r="3" fill="#000" opacity="0.1"/>
  <circle cx="115" cy="130" r="2" fill="#000" opacity="0.08"/>
  <circle cx="100" cy="140" r="3.5" fill="#000" opacity="0.12"/>
  <circle cx="75" cy="145" r="2" fill="#000" opacity="0.08"/>
  <circle cx="110" cy="150" r="2.5" fill="#000" opacity="0.1"/>
  <circle cx="95" cy="158" r="3" fill="#000" opacity="0.1"/>
  <circle cx="120" cy="155" r="2" fill="#000" opacity="0.08"/>
