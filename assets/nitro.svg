  <path d="M80 55 Q75 40 82 28 Q85 35 80 45" stroke="#000" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <path d="M100 50 Q95 32 102 18 Q106 28 100 40" stroke="#000" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <path d="M120 55 Q115 38 122 25 Q126 35 120 45" stroke="#000" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
